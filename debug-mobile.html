<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Sheets Debug</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
        }
        .debug-section {
            background: #f5f5f5;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
        }
        .debug-section h2 {
            margin-top: 0;
            color: #666;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.warning {
            background: #fff3cd;
            color: #856404;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        pre {
            background: white;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Mobile Sheets Layout Debugger</h1>
    
    <div class="debug-section">
        <h2>Current Status</h2>
        <div id="status-container"></div>
    </div>
    
    <div class="debug-section">
        <h2>Quick Actions</h2>
        <button onclick="activateMobileSheets()">Activate Mobile Sheets Variant</button>
        <button onclick="checkLocalStorage()">Check LocalStorage</button>
        <button onclick="openMainPage()">Open Main Page</button>
    </div>
    
    <div class="debug-section">
        <h2>Debug Info</h2>
        <pre id="debug-info">Click buttons above to see debug information</pre>
    </div>
    
    <script>
        function checkStatus() {
            const statusContainer = document.getElementById('status-container');
            const debugInfo = document.getElementById('debug-info');
            
            // Check localStorage
            const variant = localStorage.getItem('designVariant');
            const flashcardContent = localStorage.getItem('flashcardContent');
            
            let statusHTML = '';
            let debugText = 'Current State:\n\n';
            
            // Check variant
            if (variant === 'option-a-sheets') {
                statusHTML += '<div class="status success">✓ Mobile Sheets variant is active</div>';
                debugText += `✓ Design Variant: ${variant}\n`;
            } else {
                statusHTML += '<div class="status warning">⚠ Mobile Sheets variant is NOT active (current: ' + (variant || 'option-d (default)') + ')</div>';
                debugText += `✗ Design Variant: ${variant || 'option-d (default)'}\n`;
            }
            
            // Check flashcards
            if (flashcardContent) {
                try {
                    const data = JSON.parse(flashcardContent);
                    if (data.cards && data.cards.length > 0) {
                        statusHTML += '<div class="status success">✓ Flashcards loaded (' + data.cards.length + ' cards)</div>';
                        debugText += `✓ Flashcards: ${data.cards.length} cards\n`;
                        debugText += `✓ Set Title: ${data.title || 'Untitled'}\n`;
                    } else {
                        statusHTML += '<div class="status error">✗ No flashcards found</div>';
                        debugText += `✗ No flashcards in storage\n`;
                    }
                } catch (e) {
                    statusHTML += '<div class="status error">✗ Error parsing flashcard data</div>';
                    debugText += `✗ Error parsing flashcards: ${e.message}\n`;
                }
            } else {
                statusHTML += '<div class="status error">✗ No flashcard content in localStorage</div>';
                debugText += `✗ No flashcard content found\n`;
            }
            
            statusContainer.innerHTML = statusHTML;
            debugInfo.textContent = debugText;
        }
        
        function activateMobileSheets() {
            localStorage.setItem('designVariant', 'option-a-sheets');
            const debugInfo = document.getElementById('debug-info');
            debugInfo.textContent = 'Mobile Sheets variant activated!\n\nNow open the main page (index.html) to see the mobile layout.\n\nClick "Check LocalStorage" to verify.';
            checkStatus();
        }
        
        function checkLocalStorage() {
            const debugInfo = document.getElementById('debug-info');
            const allData = {
                designVariant: localStorage.getItem('designVariant'),
                flashcardContent: localStorage.getItem('flashcardContent'),
                sortPreference: localStorage.getItem('sortPreference'),
                filterPreference: localStorage.getItem('filterPreference')
            };
            debugInfo.textContent = 'LocalStorage Contents:\n\n' + JSON.stringify(allData, null, 2);
            checkStatus();
        }
        
        function openMainPage() {
            window.location.href = 'index.html';
        }
        
        // Check status on load
        checkStatus();
    </script>
</body>
</html>
